<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>启动台 UI 原型</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #fff;
      overflow: hidden;
      height: 100vh;
    }

    /* ===== HOMEPAGE ===== */
    .homepage {
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, #1e1e2e 0%, #141420 100%);
      display: flex;
      flex-direction: column;
      transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 1;
    }

    .homepage.slide-left {
      transform: translateX(-100%);
    }

    .homepage-header {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .homepage-title {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .homepage-content {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, 120px);
      gap: 20px;
      padding: 40px;
      justify-content: center;
      align-content: start;
    }

    .homepage-tile {
      aspect-ratio: 1;
      background: #2a2a3a;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .homepage-tile:hover {
      background: #3a3a4a;
      transform: scale(1.05);
    }

    .homepage-tile img {
      width: 48px;
      height: 48px;
    }

    .homepage-tile span {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
    }

    /* ===== BOTTOM BAR ===== */
    .bottom-bar {
      height: 88px;
      background: rgba(30, 30, 40, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .bottom-bar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }

    .bottom-bar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      border: none;
      background: rgba(255,255,255,0.06);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .nav-btn.active {
      background: rgba(255,255,255,0.15);
    }

    .nav-btn svg {
      width: 24px;
      height: 24px;
    }

    /* ===== LAUNCHPAD PAGE ===== */
    .launchpad {
      position: absolute;
      inset: 0;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 2;
    }

    .launchpad.active {
      transform: translateX(0);
    }

    /* Search Header */
    .launchpad-header {
      height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
    }

    .launchpad-title {
      font-size: 24px;
      font-weight: 600;
      opacity: 0.9;
    }

    .search-container {
      position: relative;
      width: 100%;
      max-width: 400px;
    }

    .search-input {
      width: 100%;
      height: 40px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 0 40px 0 44px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .search-input::placeholder {
      color: rgba(255,255,255,0.4);
    }

    .search-input:focus {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.4);
    }

    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      border: none;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .search-clear.visible {
      display: flex;
    }

    /* Grid Area */
    .launchpad-grid-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .launchpad-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 90px);
      gap: 16px;
      padding: 20px 60px;
      justify-content: center;
      height: 100%;
      align-content: start;
    }

    .launchpad-tile {
      aspect-ratio: 1;
      background: #2a2a3a;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .launchpad-tile:hover {
      background: #3a3a4a;
      transform: scale(1.08);
    }

    .launchpad-tile:active {
      transform: scale(0.95);
    }

    .launchpad-tile img {
      width: 44px;
      height: 44px;
      object-fit: contain;
    }

    .launchpad-tile span {
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      text-align: center;
      padding: 0 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 80px;
    }

    /* Arrow Buttons - appear on edge hover */
    .page-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 80px;
      background: rgba(255,255,255,0.06);
      border: none;
      border-radius: 22px;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.3s;
      z-index: 10;
    }

    .page-arrow:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    .page-arrow-left {
      left: 8px;
    }

    .page-arrow-right {
      right: 8px;
    }

    .launchpad-grid-container:hover .page-arrow-left:not(.hidden) {
      opacity: 1;
    }

    .launchpad-grid-container:hover .page-arrow-right:not(.hidden) {
      opacity: 1;
    }

    .page-arrow.hidden {
      display: none;
    }

    /* Page Indicator */
    .page-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 16px;
    }

    .page-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: all 0.2s;
    }

    .page-dot.active {
      background: #fff;
      width: 24px;
      border-radius: 4px;
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px;
      color: rgba(255,255,255,0.4);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* ===== BACK BUTTON ===== */
    .back-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 20;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    /* ===== PROTOTYPE CONTROLS ===== */
    .proto-controls {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a2a3a;
      border-radius: 16px;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .proto-controls h3 {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .proto-btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .proto-btn:hover {
      background: rgba(255,255,255,0.1);
    }

    .proto-btn.primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
    }
  </style>
</head>
<body>
  <!-- HOMEPAGE -->
  <div class="homepage" id="homepage">
    <div class="homepage-header">
      <div class="homepage-title">My Apps</div>
    </div>
    <div class="homepage-content">
      <div class="homepage-tile"><img src="https://via.placeholder.com/48" alt=""><span>Google</span></div>
      <div class="homepage-tile"><img src="https://via.placeholder.com/48" alt=""><span>Gmail</span></div>
      <div class="homepage-tile"><img src="https://via.placeholder.com/48" alt=""><span>GitHub</span></div>
      <div class="homepage-tile"><img src="https://via.placeholder.com/48" alt=""><span>Slack</span></div>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
      <div class="bottom-bar-left">
        <div class="avatar">U</div>
      </div>
      <div class="bottom-bar-right">
        <button class="nav-btn" title="首页">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          </svg>
        </button>
        <button class="nav-btn active" id="launchpadBtn" title="启动台">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
        </button>
        <button class="nav-btn" title="设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- LAUNCHPAD PAGE -->
  <div class="launchpad" id="launchpad">
    <!-- Back button to return to homepage -->
    <button class="back-btn" id="backBtn" title="返回首页">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>

    <!-- Header with Search -->
    <div class="launchpad-header">
      <div class="launchpad-title">启动台</div>
      <div class="search-container">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索标签...">
        <button class="search-clear" id="searchClear">×</button>
      </div>
    </div>

    <!-- Grid with Pagination Arrows -->
    <div class="launchpad-grid-container">
      <button class="page-arrow page-arrow-left hidden" id="prevPage">‹</button>
      <button class="page-arrow page-arrow-right hidden" id="nextPage">›</button>

      <div class="launchpad-grid" id="launchpadGrid">
        <!-- Tiles will be inserted by JS -->
      </div>
    </div>

    <!-- Page Indicators -->
    <div class="page-indicator" id="pageIndicator">
      <!-- Dots will be inserted by JS -->
    </div>
  </div>

  <!-- PROTOTYPE CONTROLS -->
  <div class="proto-controls">
    <h3>原型控制</h3>
    <button class="proto-btn" onclick="goHome()">返回首页</button>
    <button class="proto-btn primary" onclick="openLaunchpad()">打开启动台</button>
  </div>

  <script>
    // Sample data - simulating browser tabs
    const allTiles = [
      { name: 'Google', icon: '🌐' },
      { name: 'Gmail', icon: '📧' },
      { name: 'GitHub', icon: '🐙' },
      { name: 'Slack', icon: '💬' },
      { name: 'Notion', icon: '📝' },
      { name: 'Figma', icon: '🎨' },
      { name: 'Twitter', icon: '🐦' },
      { name: 'LinkedIn', icon: '💼' },
      { name: 'YouTube', icon: '▶️' },
      { name: 'Netflix', icon: '🎬' },
      { name: 'Spotify', icon: '🎵' },
      { name: 'Discord', icon: '🎮' },
      { name: 'Telegram', icon: '✈️' },
      { name: 'WhatsApp', icon: '💬' },
      { name: 'Zoom', icon: '📹' },
      { name: 'Teams', icon: '👥' },
      { name: 'Dropbox', icon: '📦' },
      { name: 'Drive', icon: '💾' },
      { name: 'Calendar', icon: '📅' },
      { name: 'Maps', icon: '🗺️' },
      { name: 'Photos', icon: '📷' },
      { name: 'Weather', icon: '🌤️' },
      { name: 'Clock', icon: '🕐' },
      { name: 'Calculator', icon: '🔢' },
      { name: 'Notes', icon: '📋' },
      { name: 'Reminders', icon: '⏰' },
      { name: 'Voice Memos', icon: '🎤' },
      { name: 'News', icon: '📰' },
      { name: 'Podcasts', icon: '🎙️' },
      { name: 'App Store', icon: '🛒' },
      { name: 'Settings', icon: '⚙️' },
      { name: 'Safari', icon: '🧭' },
    ];

    // Pagination state
    const TILES_PER_PAGE = 18;
    let currentPage = 0;
    let filteredTiles = [...allTiles];

    // DOM elements
    const homepage = document.getElementById('homepage');
    const launchpad = document.getElementById('launchpad');
    const launchpadBtn = document.getElementById('launchpadBtn');
    const backBtn = document.getElementById('backBtn');
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const launchpadGrid = document.getElementById('launchpadGrid');
    const pageIndicator = document.getElementById('pageIndicator');
    const prevPageBtn = document.getElementById('prevPage');
    const nextPageBtn = document.getElementById('nextPage');

    // Navigation
    function openLaunchpad() {
      homepage.classList.add('slide-left');
      launchpad.classList.add('active');
      searchInput.focus();
    }

    function goHome() {
      homepage.classList.remove('slide-left');
      launchpad.classList.remove('active');
      searchInput.value = '';
      searchClear.classList.remove('visible');
      filteredTiles = [...allTiles];
      currentPage = 0;
      renderGrid();
    }

    // Event listeners
    launchpadBtn.addEventListener('click', openLaunchpad);
    backBtn.addEventListener('click', goHome);

    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.trim().toLowerCase();
      searchClear.classList.toggle('visible', query.length > 0);
      filteredTiles = query
        ? allTiles.filter(tile => tile.name.toLowerCase().includes(query))
        : [...allTiles];
      currentPage = 0;
      renderGrid();
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      filteredTiles = [...allTiles];
      currentPage = 0;
      renderGrid();
    });

    prevPageBtn.addEventListener('click', () => {
      if (currentPage > 0) {
        currentPage--;
        renderGrid();
      }
    });

    nextPageBtn.addEventListener('click', () => {
      const totalPages = Math.ceil(filteredTiles.length / TILES_PER_PAGE);
      if (currentPage < totalPages - 1) {
        currentPage++;
        renderGrid();
      }
    });

    // Render grid
    function renderGrid() {
      const totalPages = Math.ceil(filteredTiles.length / TILES_PER_PAGE);
      const start = currentPage * TILES_PER_PAGE;
      const end = start + TILES_PER_PAGE;
      const pageTiles = filteredTiles.slice(start, end);

      // Update arrows visibility
      prevPageBtn.classList.toggle('hidden', currentPage === 0 || totalPages <= 1);
      nextPageBtn.classList.toggle('hidden', currentPage >= totalPages - 1 || totalPages <= 1);

      // Render tiles
      if (pageTiles.length === 0) {
        launchpadGrid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
            <p>没有找到匹配的标签</p>
          </div>
        `;
      } else {
        launchpadGrid.innerHTML = pageTiles.map(tile => `
          <div class="launchpad-tile" onclick="window.open('https://example.com', '_blank')">
            <span style="font-size: 32px;">${tile.icon}</span>
            <span>${tile.name}</span>
          </div>
        `).join('');
      }

      // Render page indicators
      pageIndicator.innerHTML = Array.from({ length: totalPages }, (_, i) => `
        <div class="page-dot ${i === currentPage ? 'active' : ''}"></div>
      `).join('');
    }

    // Initial render
    renderGrid();
  </script>
</body>
</html>
