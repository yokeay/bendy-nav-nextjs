<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日历</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: transparent;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
    }
    body {
      container-type: size;
      container-name: card;
    }
    .card {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      display: grid;
      grid-template-rows: 1fr;
      gap: 4px;
      overflow: hidden;
    }
    .block { display: none; }
    .block-sm { display: flex; }

    /* Small (1x1) — day number + weekday + lunar */
    .sm {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 2px;
      height: 100%;
    }
    .sm .day-num {
      font-size: clamp(28px, 48cqh, 56px);
      font-weight: 800;
      line-height: 1;
      color: #0f172a;
    }
    .sm .weekday {
      font-size: clamp(11px, 11cqh, 14px);
      color: #2563eb;
      font-weight: 600;
    }
    .sm .lunar {
      font-size: clamp(11px, 11cqh, 14px);
      color: #475569;
    }
    .sm .badge {
      display: inline-block;
      margin-top: 4px;
      font-size: clamp(10px, 10cqh, 12px);
      color: #fff;
      background: #dc2626;
      border-radius: 6px;
      padding: 2px 6px;
      max-width: 90%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sm .badge.term { background: #0ea5e9; }
    .sm .btn-more {
      margin-top: 6px;
      border: none;
      background: #e2e8f0;
      color: #1e293b;
      border-radius: 8px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
    }

    /* Medium (2x2) — header row + main block + footer row */
    .md {
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr;
      gap: 6px;
      height: 100%;
    }
    .md-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 13px;
      color: #64748b;
    }
    .md-header .year { font-weight: 600; color: #0f172a; }
    .md-header .gz { color: #475569; }
    .md-main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 2px;
    }
    .md-main .day-num {
      font-size: 54px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -1px;
    }
    .md-main .weekday {
      font-size: 13px;
      color: #2563eb;
      font-weight: 600;
      margin-top: 2px;
    }
    .md-main .lunar-line {
      margin-top: 4px;
      font-size: 13px;
      color: #334155;
    }
    .md-main .badges {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
    }
    .md-main .badge {
      font-size: 11px;
      color: #fff;
      background: #dc2626;
      border-radius: 6px;
      padding: 2px 6px;
    }
    .md-main .badge.term { background: #0ea5e9; }
    .md-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #64748b;
    }
    .md-footer .btn-more {
      border: none;
      background: #e2e8f0;
      color: #1e293b;
      border-radius: 8px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
    }

    /* Wide (2x4) — everything + yi/ji + mini week strip */
    .lg {
      grid-template-rows: auto auto 1fr auto auto;
      grid-template-columns: 1fr;
      gap: 8px;
      height: 100%;
      padding: 4px 4px;
    }
    .lg-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 13px;
      color: #64748b;
    }
    .lg-header .year { font-weight: 600; color: #0f172a; font-size: 14px; }
    .lg-hero {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .lg-hero .day-num {
      font-size: 64px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
    }
    .lg-hero .meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 13px;
      color: #334155;
    }
    .lg-hero .meta .weekday { color: #2563eb; font-weight: 600; }
    .lg-hero .meta .badge {
      display: inline-block;
      font-size: 11px;
      color: #fff;
      background: #dc2626;
      border-radius: 6px;
      padding: 2px 6px;
      margin-top: 2px;
    }
    .lg-hero .meta .badge.term { background: #0ea5e9; }
    .lg-yiji {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 11px;
      color: #334155;
    }
    .lg-yiji .col {
      background: #f8fafc;
      border-radius: 8px;
      padding: 6px 8px;
      line-height: 1.4;
    }
    .lg-yiji .col .label {
      display: inline-block;
      min-width: 18px;
      margin-right: 4px;
      font-weight: 700;
    }
    .lg-yiji .col.yi .label { color: #16a34a; }
    .lg-yiji .col.ji .label { color: #dc2626; }
    .lg-week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .lg-week .wd {
      text-align: center;
      font-size: 10px;
      color: #64748b;
      border-radius: 6px;
      padding: 4px 0;
    }
    .lg-week .wd .d { font-size: 13px; font-weight: 600; color: #1f2937; }
    .lg-week .wd.today {
      background: #2563eb;
      color: #fff;
    }
    .lg-week .wd.today .d { color: #fff; }
    .lg-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #64748b;
    }
    .lg-footer .btn-more {
      border: none;
      background: #e2e8f0;
      color: #1e293b;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    /* Breakpoints: container queries decide layout */
    @container card (min-width: 220px) and (min-height: 200px) {
      .block-sm { display: none; }
      .block-md { display: grid; }
    }
    @container card (min-width: 360px) and (min-height: 360px) {
      .block-md { display: none; }
      .block-lg { display: grid; }
    }
    @container card (min-width: 480px) and (min-height: 240px) and (max-height: 359px) {
      .block-md { display: none; }
      .block-lg { display: grid; }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Small variant -->
    <div class="block block-sm sm" id="sm"></div>
    <!-- Medium variant -->
    <div class="block block-md md" id="md"></div>
    <!-- Wide variant -->
    <div class="block block-lg lg" id="lg"></div>
  </div>

  <script src="/plugins/calendar/static/lunar.min.js"></script>
  <script>
    (function () {
      var weekdays = ['周日','周一','周二','周三','周四','周五','周六']
      var now = new Date()

      var calendarData = null
      try {
        if (typeof Solar !== 'undefined') {
          var solar = Solar.fromDate(now)
          var lunar = solar.getLunar()
          calendarData = {
            solar: solar,
            lunar: lunar,
            gregDay: now.getDate(),
            year: now.getFullYear(),
            month: now.getMonth() + 1,
            weekday: weekdays[now.getDay()],
            lunarMonthDay: '农历' + lunar.getMonthInChinese() + '月' + lunar.getDayInChinese(),
            lunarShort: lunar.getMonthInChinese() + '月' + lunar.getDayInChinese(),
            jieQi: lunar.getJieQi() || '',
            festivals: lunar.getFestivals() || [],
            solarFestivals: (solar.getFestivals && solar.getFestivals()) || [],
            shengXiao: lunar.getYearShengXiao(),
            ganZhi: lunar.getYearInGanZhi(),
            yi: (lunar.getDayYi && lunar.getDayYi()) || [],
            ji: (lunar.getDayJi && lunar.getDayJi()) || []
          }
        }
      } catch (err) {
        calendarData = null
      }

      function escapeHtml (text) {
        return String(text).replace(/[&<>"']/g, function (ch) {
          return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[ch]
        })
      }

      function primaryBadge (d) {
        var festAll = (d.festivals || []).concat(d.solarFestivals || [])
        if (festAll.length > 0) {
          return { kind: 'festival', text: festAll[0] }
        }
        if (d.jieQi) {
          return { kind: 'term', text: d.jieQi }
        }
        return null
      }

      function openWindow () {
        if (typeof openCard === 'function') {
          openCard({ name: '日历', src: '/plugins/calendar/static/ico.png', url: '/plugins/calendar/window' })
        } else {
          window.location.href = '/plugins/calendar/window'
        }
      }

      function renderSmall (d) {
        var host = document.getElementById('sm')
        var badge = primaryBadge(d)
        var badgeHtml = badge
          ? '<span class="badge ' + (badge.kind === 'term' ? 'term' : '') + '">' + escapeHtml(badge.text) + '</span>'
          : ''
        host.innerHTML =
          '<div class="day-num">' + d.gregDay + '</div>' +
          '<div class="weekday">' + d.weekday + '</div>' +
          '<div class="lunar">' + escapeHtml(d.lunarShort) + '</div>' +
          badgeHtml
      }

      function renderMedium (d) {
        var host = document.getElementById('md')
        var festAll = (d.festivals || []).concat(d.solarFestivals || [])
        var badges = []
        festAll.forEach(function (f) {
          badges.push('<span class="badge">' + escapeHtml(f) + '</span>')
        })
        if (d.jieQi) {
          badges.push('<span class="badge term">' + escapeHtml(d.jieQi) + '</span>')
        }
        host.innerHTML =
          '<div class="md-header">' +
            '<span class="year">' + d.year + '年' + d.month + '月</span>' +
            '<span class="gz">' + escapeHtml(d.ganZhi) + '年 · ' + escapeHtml(d.shengXiao) + '</span>' +
          '</div>' +
          '<div class="md-main">' +
            '<div class="day-num">' + d.gregDay + '</div>' +
            '<div class="weekday">' + d.weekday + '</div>' +
            '<div class="lunar-line">' + escapeHtml(d.lunarMonthDay) + '</div>' +
            '<div class="badges">' + badges.join('') + '</div>' +
          '</div>' +
          '<div class="md-footer">' +
            '<span>' + escapeHtml(d.lunar.toString().slice(0,10)) + '</span>' +
            '<button class="btn-more" type="button" data-more>月历</button>' +
          '</div>'
        var btn = host.querySelector('[data-more]')
        if (btn) btn.addEventListener('click', openWindow)
      }

      function renderWide (d) {
        var host = document.getElementById('lg')
        var festAll = (d.festivals || []).concat(d.solarFestivals || [])
        var badge = primaryBadge(d)
        var badgeHtml = badge
          ? '<span class="badge ' + (badge.kind === 'term' ? 'term' : '') + '">' + escapeHtml(badge.text) + '</span>'
          : ''

        var weekStart = new Date(now)
        weekStart.setDate(now.getDate() - now.getDay())
        var weekCells = []
        for (var i = 0; i < 7; i++) {
          var dt = new Date(weekStart)
          dt.setDate(weekStart.getDate() + i)
          var isToday = dt.toDateString() === now.toDateString()
          weekCells.push(
            '<div class="wd' + (isToday ? ' today' : '') + '">' +
              '<div>' + weekdays[dt.getDay()] + '</div>' +
              '<div class="d">' + dt.getDate() + '</div>' +
            '</div>'
          )
        }

        var yiText = (d.yi || []).slice(0, 6).map(escapeHtml).join(' ') || '—'
        var jiText = (d.ji || []).slice(0, 6).map(escapeHtml).join(' ') || '—'

        host.innerHTML =
          '<div class="lg-header">' +
            '<span class="year">' + d.year + '年' + d.month + '月</span>' +
            '<span>' + escapeHtml(d.ganZhi) + '年 · 属' + escapeHtml(d.shengXiao) + '</span>' +
          '</div>' +
          '<div class="lg-hero">' +
            '<div class="day-num">' + d.gregDay + '</div>' +
            '<div class="meta">' +
              '<span class="weekday">' + d.weekday + '</span>' +
              '<span>' + escapeHtml(d.lunarMonthDay) + '</span>' +
              badgeHtml +
            '</div>' +
          '</div>' +
          '<div class="lg-yiji">' +
            '<div class="col yi"><span class="label">宜</span>' + yiText + '</div>' +
            '<div class="col ji"><span class="label">忌</span>' + jiText + '</div>' +
          '</div>' +
          '<div class="lg-week">' + weekCells.join('') + '</div>' +
          '<div class="lg-footer">' +
            '<span>' + escapeHtml(d.lunar.toString().slice(0,10)) + '</span>' +
            '<button class="btn-more" type="button" data-more>查看月历</button>' +
          '</div>'
        var btn = host.querySelector('[data-more]')
        if (btn) btn.addEventListener('click', openWindow)
      }

      function renderFallback () {
        var host = document.getElementById('sm')
        host.innerHTML =
          '<div class="day-num">' + now.getDate() + '</div>' +
          '<div class="weekday">' + weekdays[now.getDay()] + '</div>' +
          '<div class="lunar">' + now.getFullYear() + '年' + (now.getMonth()+1) + '月</div>' +
          '<button class="btn-more" type="button" data-more>查看月历</button>'
        var btn = host.querySelector('[data-more]')
        if (btn) btn.addEventListener('click', openWindow)
      }

      if (!calendarData) {
        renderFallback()
      } else {
        renderSmall(calendarData)
        renderMedium(calendarData)
        renderWide(calendarData)
      }
    })()
  </script>
</body>
</html>
