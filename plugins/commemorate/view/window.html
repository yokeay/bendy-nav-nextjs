<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>纪念日管理</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .panel {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.08);
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    input[type="text"], input[type="date"] {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
    }
    .btn {
      border: none;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 14px;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #f8fafc;
    }
    .item .name {
      font-weight: 600;
      flex: 1;
    }
    .item .date {
      color: #64748b;
      font-size: 13px;
    }
    .item .days {
      color: #ef4444;
      font-size: 13px;
    }
    .item .del {
      border: none;
      background: #fee2e2;
      color: #b91c1c;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="title">新增纪念日</div>
      <div class="form">
        <input type="text" id="name" placeholder="名称" />
        <input type="date" id="date" />
        <button class="btn" id="add">添加</button>
      </div>
    </div>

    <div class="panel">
      <div class="title">纪念日列表</div>
      <div class="list" id="list"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'commemorate_list_v1'

    function getList () {
      try {
        const list = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')
        return Array.isArray(list) ? list : []
      } catch (e) {
        return []
      }
    }

    function saveList (list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list))
    }

    function daysUntil (dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number)
      if (!y || !m || !d) return null
      const now = new Date()
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate())
      let target = new Date(today.getFullYear(), m - 1, d)
      if (target < today) {
        target = new Date(today.getFullYear() + 1, m - 1, d)
      }
      return Math.ceil((target - today) / 86400000)
    }

    function render () {
      const list = getList()
      const container = document.getElementById('list')
      container.innerHTML = ''
      if (!list.length) {
        container.textContent = '暂无纪念日'
        return
      }
      const sorted = list.map(item => ({
        ...item,
        days: daysUntil(item.date)
      })).sort((a, b) => (a.days || 0) - (b.days || 0))

      sorted.forEach(item => {
        const row = document.createElement('div')
        row.className = 'item'
        const name = document.createElement('div')
        name.className = 'name'
        name.textContent = item.name
        const date = document.createElement('div')
        date.className = 'date'
        date.textContent = item.date
        const days = document.createElement('div')
        days.className = 'days'
        days.textContent = item.days !== null ? `还有 ${item.days} 天` : '--'
        const del = document.createElement('button')
        del.className = 'del'
        del.textContent = '删除'
        del.addEventListener('click', () => {
          const next = getList().filter(x => x.id !== item.id)
          saveList(next)
          render()
        })
        row.appendChild(name)
        row.appendChild(date)
        row.appendChild(days)
        row.appendChild(del)
        container.appendChild(row)
      })
    }

    document.getElementById('add').addEventListener('click', () => {
      const name = document.getElementById('name').value.trim()
      const date = document.getElementById('date').value
      if (!name || !date) return
      const list = getList()
      list.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        name,
        date
      })
      saveList(list)
      document.getElementById('name').value = ''
      render()
    })

    render()
  </script>
</body>
</html>
