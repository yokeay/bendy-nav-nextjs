<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>纪念日</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: transparent;
      color: #0f172a;
    }
    .card {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      color: #334155;
    }
    .event {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }
    .name {
      font-size: 18px;
      font-weight: 700;
    }
    .count {
      font-size: 14px;
      color: #ef4444;
    }
    .date {
      font-size: 12px;
      color: #64748b;
    }
    .more {
      border: none;
      background: #e2e8f0;
      color: #1e293b;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      align-self: flex-start;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">纪念日</div>
    <div class="event">
      <div class="name" id="name">暂无纪念日</div>
      <div class="count" id="count"></div>
      <div class="date" id="date"></div>
    </div>
    <button class="more" id="openWindow">管理</button>
  </div>

  <script src="/static/js/card.js"></script>
  <script>
    const STORAGE_KEY = 'commemorate_list_v1'

    function getList () {
      try {
        const list = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')
        return Array.isArray(list) ? list : []
      } catch (e) {
        return []
      }
    }

    function daysUntil (dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number)
      if (!y || !m || !d) return null
      const now = new Date()
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate())
      let target = new Date(today.getFullYear(), m - 1, d)
      if (target < today) {
        target = new Date(today.getFullYear() + 1, m - 1, d)
      }
      return Math.ceil((target - today) / 86400000)
    }

    function render () {
      const list = getList()
      if (!list.length) {
        document.getElementById('name').textContent = '暂无纪念日'
        document.getElementById('count').textContent = ''
        document.getElementById('date').textContent = ''
        return
      }
      const enriched = list.map(item => ({
        ...item,
        days: daysUntil(item.date)
      })).filter(item => item.days !== null)
      enriched.sort((a, b) => a.days - b.days)
      const next = enriched[0]
      document.getElementById('name').textContent = next.name
      document.getElementById('count').textContent = `还有 ${next.days} 天`
      document.getElementById('date').textContent = next.date
    }

    document.getElementById('openWindow').addEventListener('click', () => {
      if (typeof openCard === 'function') {
        openCard({
          name: '纪念日',
          src: '/plugins/commemorate/static/ico.svg',
          url: '/plugins/commemorate/window'
        })
      } else {
        window.location.href = '/plugins/commemorate/window'
      }
    })

    render()
    setInterval(render, 60000)
  </script>
</body>
</html>
